              type="text"

              <button
                type="button"

                data-role="collapseAll"

              <button
                type="button"
                class="btn btn-outline-info"
                data-role="autoCollapse"

                <i class="fas fa-flag"></i>
              </button>

              <button
                type="button"
                class="btn btn-outline-info"
                data-role="hideListNumber"
