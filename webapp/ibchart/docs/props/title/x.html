<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="/resources/css/d2coding.css" />

  <body>
    <div class="markdown-body">
      <h1>
        x <em><strong>(title properties)</strong></em>
      </h1>
      <blockquote>
        <p>제목의 좌우 포지션 이동값을 설정합니다.</p>
      </blockquote>
      <h3>Info</h3>
      <div class="table-responsive">
        <table class="table">
          <thead>
            <tr>
              <th>name</th>
              <th>type</th>
              <th>required (default)</th>
              <th>description</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>x</td>
              <td><code>number</code></td>
              <td><span class="optional">선택(0)</span></td>
              <td>제목 좌우 포지션 이동 값</td>
            </tr>
          </tbody>
        </table>
      </div>
      <h3>Example</h3>
      <pre class="hljs"><code>myChart.setOptions({
  <span class="hljs-attr">title</span>: {  <span class="hljs-comment">// title 설정</span>
    text: <span class="hljs-string">"cc별 중고자동차 판매량"</span>,
    <span class="hljs-attr">x</span>:<span class="hljs-number">40</span>
  }
}, {
  <span class="hljs-attr">append</span>: <span class="hljs-literal">true</span>,
  <span class="hljs-attr">redraw</span>: <span class="hljs-literal">true</span>
});
</code></pre>
      <h3>제공 버전</h3>
      <div class="table-responsive">
        <table class="table">
          <thead>
            <tr>
              <th>version</th>
              <th>desc</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>7.3.0.0</td>
              <td></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
    <script src="../../resources/plugins/jquery/jquery.slim.min.js"></script>
    <script src="../../resources/plugins/jquery/jquery.mark.min.js"></script>
    <script src="../../resources/js/ibChart/md-content.js"></script>
  </body>
</html>
