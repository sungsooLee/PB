    <div class="markdown-body">
      <h1>
        doPrint <em><strong>(ChartObject method)</strong></em>
      </h1>
      <blockquote>
        <p>
          차트 이미지를 인쇄합니다. <br />
          인쇄 처리는 브라우저의 인쇄 기능을 따르며 이미지를 인쇄하기 위해서는
          브라우저의 <code>페이지 설정</code>에서
          <code>배경색 및 이미지 인쇄 옵션</code>을 설정해야 합니다.
        </p>
      </blockquote>
      <h3>Syntax</h3>
      <pre class="hljs"><code>{ibchart}.doPrint();
</code></pre>
      <h3>Returns</h3>
      <p>
        <em><strong>none</strong></em>
      </p>
      <h3>Example</h3>
      <pre class="hljs"><code><span class="hljs-comment">//차트 인쇄하기</span>
myChart.doPrint();
</code></pre>
