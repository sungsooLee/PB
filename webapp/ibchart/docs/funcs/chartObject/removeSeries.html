  <body>
    <div class="markdown-body">
      <h1>
        removeSeries <em><strong>(ChartObject method)</strong></em>
      </h1>
      <blockquote>
        <p>특정 시리즈를 제거합니다.</p>
      </blockquote>
      <h3>Syntax</h3>
      <pre class="hljs"><code>{ibchart}.removeSeries(index);
</code></pre>
      <h3>Parameters</h3>
      <div class="table-responsive">
        <table class="table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Type</th>
              <th>Required</th>
              <th>Description</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><code>index</code></td>
              <td><code>number</code></td>
              <td><span class="required">필수</span></td>
              <td>시리즈 인덱스</td>
            </tr>
          </tbody>
        </table>
      </div>
      <h3>Returns</h3>
      <p>
        <em><strong>boolean, 성공 여부</strong></em>
      </p>
      <h3>Example</h3>
      <pre
        class="hljs"
      ><code><span class="hljs-comment">// 첫번째 시리즈(index가 0) 제거</span>
myChart.removeSeries(<span class="hljs-number">0</span>);
</code></pre>

      <div class="table-responsive">
        <table class="table">
          <thead>

            </tr>
          </thead>
          <tbody>
            <tr>
              <td>7.3.0.0</td>
              <td></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
