<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Publishing Task Board</title>
    <style>
      @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #f8fafc;
        color: #0f172a;
        font-family: "Pretendard", sans-serif;
        padding: 40px 20px;
      }
      .container {
        max-width: 720px;
        margin: 0 auto;
      }
      .header {
        margin-bottom: 32px;
      }
      .header h1 {
        font-size: 28px;
        letter-spacing: -0.02em;
        margin-bottom: 8px;
      }

      /* 대시보드 */
      .dashboard {
        background: #ffffff;
        padding: 24px;
        border-radius: 20px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        margin-bottom: 24px;
      }
      .progress-meta {
        display: flex;
        justify-content: space-between;
        margin-bottom: 12px;
        font-weight: 600;
      }
      .progress-track {
        height: 10px;
        background: #f1f5f9;
        border-radius: 10px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: #3b82f6;
        border-radius: 10px;
        transition: width 1s ease-out;
      }

      /* 리스트 */
      .list-container {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .card {
        background: #ffffff;
        padding: 20px;
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border: 1px solid #e2e8f0;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }
      .card:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
      }

      .title {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 4px;
        display: block;
      }
      .url {
        font-size: 13px;
        color: #64748b;
        text-decoration: none;
        display: inline-block;
      }
      .url:hover {
        text-decoration: underline;
        color: #3b82f6;
      }

      .badge {
        padding: 6px 14px;
        border-radius: 10px;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }
      .done {
        background: #f0fdf4;
        color: #16a34a;
      }
      .progress {
        background: #fffbeb;
        color: #d97706;
      }
      .wait {
        background: #f1f5f9;
        color: #475569;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="header">
        <h1>PBWON 퍼블리싱</h1>
      </div>

      <!-- <div class="dashboard">
        <div class="progress-meta">
          <span id="stats"></span>
          <span id="progressText">0%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progressBar"></div>
        </div>
      </div> -->

      <div class="list-container" id="list"></div>
    </div>

    <script>
      const pages = [
        {
          title: "시뮬레이션 상세",
          url: "./PBWSS/WM-SCR-13.html",
          status: "progress",
        },
        {
          title: "고객 TO-DO 상세",
          url: "./PBWSS/WM-SCR-15.html",
          status: "done",
        },
      ];

      const statusMap = { done: "완료", progress: "진행중", wait: "대기중" };
      const list = document.getElementById("list");

      list.innerHTML = pages
        .map(
          (page) => `
        <div class="card">
          <div>
            <strong class="title">${page.title}</strong>
            <a href="${page.url}" target="_blank" class="url">${page.url}</a>
          </div>
          <span class="badge ${page.status}">${statusMap[page.status]}</span>
        </div>
      `,
        )
        .join("");

      const total = pages.length;
      const completed = pages.filter((p) => p.status === "done").length;
      const percent = Math.round((completed / total) * 100);

      document.getElementById("progressBar").style.width = `${percent}%`;
      document.getElementById("progressText").textContent = `${percent}%`;
      document.getElementById("stats").textContent =
        `진행 현황 (${completed}/${total})`;
    </script>
  </body>
</html>
