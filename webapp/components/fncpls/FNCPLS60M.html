<div class="group-form mt16">
	<div class="group-title">
		<strong class="title-medium">선택한 통화의 매매기준율을 설정한 시간에 푸시알림으로 보내드려요</strong>
	</div>
	<div class="group-title">
		<p class="body-small fc-typography-caption fs-14 px4">(최대 3개까지 설정 가능)</p>
	</div>
</div>

<!-- group-form -->
<div class="group-form mt40">
	<div class="group-title">
		<strong class="title-medium">대상통화선택</strong>
	</div>
	<div class="group-content">
		<button id="selectCurrency" type="button" class="anchor chevron anchor-fluid anchor-border" data-micromodal-trigger="modal-repeat"><span id="selectCurrencyText" class="body-large fw-700">선택</span></button>
	</div>
</div>
<!-- //group-form -->

<!-- group-form -->
<div class="group-form mt40" style="display:none;">
	<div class="group-title">
		<strong class="title-medium">요일</strong>
	</div>
	<div class="group-content">
		<div class="inp inp-board inp-board-repeat5">
			<input type="checkbox" name="days" aria-label="월" value="1" checked>
			<input type="checkbox" name="days" aria-label="화" value="2" checked>
			<input type="checkbox" name="days" aria-label="수" value="3" checked>
			<input type="checkbox" name="days" aria-label="목" value="4" checked>
			<input type="checkbox" name="days" aria-label="금" value="5" checked>
		</div>
	</div>
</div>
<!-- //group-form -->

<!-- group-form -->
<div class="group-form mt40">
	<div class="group-title">
		<strong class="title-medium">시간</strong>
	</div>
	<div class="group-content">
		<div class="inp inp-toggle-text">
			<input type="radio" name="pushtime" aria-label="오전 9시" value="09" checked>
			<input type="radio" name="pushtime" aria-label="오전 11시" value="11">
			<input type="radio" name="pushtime" aria-label="오후 1시" value="13">
		</div>
	</div>
</div>
<!-- //group-form -->

<!-- bottom-btn -->
<div class="bottom-btn">
	<div class="btn-wrap">
		<button id="savealim" type="button" class="btn-large btn-primary"><i class="ico-check"></i>저장</button>
	</div>
</div>
