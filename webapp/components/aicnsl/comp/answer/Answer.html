<!-- 답변1 -->
<div class="chatbody">
  <div class="message-text left">
  	<div class="mb10" id="extraDiv" style="display:none;">
  	  <div class="tags tags-small tags-lightBlue mb10">- 검색기반 답변</div>
      	<strong class="title-small fw-500">※ 아래 답변은 근거 문서와 유사도가 낮으니 활용에 주의하세요.</strong>
      </div>
	  <div class="sub-text mb40" id="divThinking" style="display:none;">
	      <strong class="title-small" id="strongThinkTitle">▸ AI 추론과정</strong>
	      <pre class="text fs-15 fw-400" id="preThinkTxt" style="line-height:1.15;display:none;"></pre>
      </div>
    <div class="text mt-40" id="answerTxt"><pre id="answerPre" style="word-break: keep-all"></pre></div>
    <div class="sub-text" id="rltCmpln">
      <div class="tags tags-small tags-lightBlue">관련민원</div>
      	<strong class="title-small" id="rltCmplnTtl">-</strong>
      <p class="text fs-15" id="rltCmplnDtl">-</p>
    </div>
    <div class="message-footer" id="likeDisLikePanel">
      <div class="left">
        <div class="btn-rating-wrap" style="display:none;">
          <button id="btnLike" type="button" class="btn-rating" aria-label="좋아요">
            <i class="icon-only icon-20 icon-thumbsup bg-icon-gray_1"></i>
          </button>
          <button id="btnDisLike" type="button" class="btn-rating" aria-label="싫어요">
            <i class="icon-only icon-20 icon-thumbsdown bg-icon-gray_1"></i>
          </button>
        </div>
      </div>
      <div class="right">
        <button id="btnReasonDisplay" type="button" class="btn-xsmall btn-secondary btn-round">근거</button>
      </div>
    </div>
  </div>
</div>
